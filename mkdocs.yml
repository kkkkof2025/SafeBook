site_name: 安全漏洞实战手册
site_description: 从 Web 安全到 AI 安全 — 每个漏洞的原理、案例、POC 与修复 — 从入门到精通的安全成长之路
site_url: https://kkkkof2025.github.io/SafeBook/
repo_url: https://github.com/kkkkof2025/SafeBook
repo_name: kkkkof2025/SafeBook
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: ../safe-site
exclude_docs: |
  site/
  _site/
  dist/
  build/
  node_modules/
  vendor/
  tmp/
  temp/
  .git/
  workspace/
  README.md
  mkdocs.yml
theme:
  name: material
  language: zh
  font: false
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - toc.follow
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.select
    - search.highlight
    - search.suggest
    - search.share
  palette:
    - scheme: default
      primary: red
      accent: amber
extra_css:
  - stylesheets/extra.css
plugins:
  - search:
      lang:
        - zh
        - en
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shortener: true
      social_url_shortener: true
      user: kkkkof2025
      repo: SafeBook
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
